site_name: Robotics Class
site_description: Robotics 1 & Robotics 2 Curriculum (MVP)
site_url: https://rayus86.github.io/roboticsclass/
repo_url: https://github.com/rayus86/roboticsclass
repo_name: roboticsclass
theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - toc.integrate
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: blue
      accent: deep orange
markdown_extensions:
  - admonition
  - footnotes
  - codehilite
  - tables
  - toc:
      permalink: true
  - def_list
  - attr_list
  - md_in_html
  - abbr
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
nav:
  - Home: index.md
  - Robotics 1:
      - Syllabus: robotics1/syllabus.md
      - Schedule: robotics1/schedule.md
      - Lessons:
          - L01 Intro & Platforms: robotics1/lessons/lesson-01-intro-platforms.md
      - Labs:
          - Lab 1 Blink (Arduino / EV3): robotics1/labs/lab-01-blink-multi.md
  - Robotics 2:
      - Syllabus (Draft): robotics2/syllabus.md
  - Reference:
      - Tooling Roadmap: reference/software/ide-tooling-map.md
      - CodeHS Overview: reference/software/codehs-overview.md
      - PyBricks: reference/software/pybricks.md
      - Glossary: glossary.md
extra:
  course_tracks:
    - Robotics 1
    - Robotics 2
plugins:
  - search